name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "alem.png;." --name "Alem" launch_enhanced.py

      - name: Build executable (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "alem.png:." --name "Alem" launch_enhanced.py

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Alem-Windows
          path: dist/Alem

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Alem-Linux
          path: dist/Alem

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Alem-macOS
          path: dist/Alem

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Alem-Windows
          path: Alem-Windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Alem-Linux
          path: Alem-Linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Alem-macOS
          path: Alem-macOS

      - name: Zip artifacts
        run: |
          cd Alem-Windows && zip -r ../Alem-Windows.zip . && cd ..
          cd Alem-Linux && zip -r ../Alem-Linux.zip . && cd ..
          cd Alem-macOS && zip -r ../Alem-macOS.zip . && cd ..

      - name: Generate timestamp tag
        if: github.ref == 'refs/heads/main'
        id: tagger
        run: echo "tag=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && steps.tagger.outputs.tag || github.ref_name }}
          files: |
            Alem-Windows.zip
            Alem-Linux.zip
            Alem-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
